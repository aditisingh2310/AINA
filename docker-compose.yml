version: '3.9'
services:
  api:
    build: .
    container_name: aina_api
    restart: unless-stopped
    env_file: .env
    ports:
      - '5000:5000'
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/usr/src/app
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: aina_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aina_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aina_db}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aina_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
